<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-container { max-width: 800px; margin: 120px auto 50px; padding: 2.5rem; background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; }
    .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group label { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em;}
    .form-control { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 1rem; border-radius: 8px; font-family: var(--font-body); transition: 0.3s;}
    .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(212,168,83,0.1);}
    
    .tabs { display: flex; gap: 2rem; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
    .tab-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-family: var(--font-display); font-size: 1.3rem; transition: 0.3s; padding-bottom: 0.5rem;}
    .tab-btn.active { color: var(--accent); font-weight: bold; border-bottom: 2px solid var(--accent); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.4s ease forwards; }
    
    .danger-zone { margin-top: 3rem; padding-top: 2rem; border-top: 1px dashed red;}

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">CA Admin</a>
      <div class="nav-actions"><a href="index.html" class="btn-nav">Back to Site</a></div>
    </div>
  </nav>

  <div class="admin-container fade-in visible">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('projects', event)">Add Project</button>
      <button class="tab-btn" onclick="switchTab('education', event)">Add Education</button>
      <button class="tab-btn" onclick="switchTab('certifications', event)">Add Certification</button>
    </div>

    <div id="projects" class="tab-content active">
      <form id="projectForm">
        <div class="form-group">
          <label>Project Title</label>
          <input type="text" id="projTitle" class="form-control" required placeholder="e.g. Chat App">
        </div>
        <div class="form-group">
          <label>Tech Stack (Comma separated)</label>
          <input type="text" id="projTech" class="form-control" placeholder="e.g. React, Node, MongoDB" required>
        </div>
        <div class="form-group">
          <label>GitHub/Live Link</label>
          <input type="url" id="projLink" class="form-control" required placeholder="https://github.com/...">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="projDesc" class="form-control" rows="4" required placeholder="What did you build?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">Save Project</button>
      </form>
    </div>

    <div id="education" class="tab-content">
      <form id="educationForm">
        <div class="form-group">
          <label>Degree / Title</label>
          <input type="text" id="eduTitle" class="form-control" required placeholder="e.g. MSc in Software Engineering">
        </div>
        <div class="form-group">
          <label>Institution</label>
          <input type="text" id="eduSchool" class="form-control" required placeholder="e.g. Addis Ababa University">
        </div>
        <div class="form-group">
          <label>Years</label>
          <input type="text" id="eduYears" class="form-control" placeholder="e.g. 2026 - 2028" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">Save Education</button>
      </form>
    </div>

    <div id="certifications" class="tab-content">
      <form id="certForm">
        <div class="form-group">
          <label>Certification Name</label>
          <input type="text" id="certName" class="form-control" required placeholder="e.g. AWS Solutions Architect">
        </div>
        <div class="form-group">
          <label>Issuer</label>
          <input type="text" id="certIssuer" class="form-control" required placeholder="e.g. Amazon Web Services">
        </div>
        <div class="form-group">
          <label>Link / Credential ID</label>
          <input type="text" id="certLink" class="form-control" placeholder="Optional URL">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">Save Certification</button>
      </form>
    </div>

    <div class="danger-zone">
        <button onclick="clearData()" class="btn btn-ghost" style="color: #ef4444; border-color: #ef4444; width: 100%; justify-content: center;">Clear All Added Data</button>
    </div>

  </div>

  <script src="admin.js"></script>
</body>
</html>
